services:
  - type: web
    name: teamsync-api
    env: node
    buildCommand: npm ci && npm run build --workspace=apps/server
    startCommand: npm start --workspace=apps/server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: BASE_PATH
        value: /api/v1
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_GOOGLE_CALLBACK_URL
        sync: false
